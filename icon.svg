<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fondo con gradiente azul ORT -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0C447C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E6F1FB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C5B5E8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="80" fill="url(#bgGrad)"/>
  
  <!-- Diagrama NS+ simplificado -->
  <g transform="translate(100, 120)">
    <!-- Bloque superior (método) -->
    <rect x="0" y="0" width="312" height="50" fill="#fff" stroke="#1a3a6e" stroke-width="4"/>
    <text x="156" y="33" font-family="monospace" font-size="24" font-weight="bold" fill="#1a3a6e" text-anchor="middle">NS+Gen</text>
    
    <!-- Bloque IF (dos columnas) -->
    <rect x="0" y="54" width="312" height="40" fill="url(#blockGrad)" stroke="#534AB7" stroke-width="3"/>
    <text x="78" y="79" font-family="monospace" font-size="18" fill="#534AB7" text-anchor="middle">V</text>
    <text x="234" y="79" font-family="monospace" font-size="18" fill="#534AB7" text-anchor="middle">F</text>
    <line x1="156" y1="54" x2="156" y2="94" stroke="#534AB7" stroke-width="3"/>
    
    <!-- Contenido IF -->
    <rect x="0" y="97" width="156" height="80" fill="#fff" stroke="#534AB7" stroke-width="3"/>
    <rect x="156" y="97" width="156" height="80" fill="#fff" stroke="#534AB7" stroke-width="3"/>
    
    <!-- Instrucciones dentro -->
    <rect x="8" y="105" width="140" height="28" fill="#fffbea" stroke="#ddd" stroke-width="1" rx="4"/>
    <rect x="8" y="141" width="140" height="28" fill="#fffbea" stroke="#ddd" stroke-width="1" rx="4"/>
    <rect x="164" y="105" width="140" height="28" fill="#fffbea" stroke="#ddd" stroke-width="1" rx="4"/>
    
    <!-- Loop (FOR con barra lateral lila) -->
    <rect x="0" y="181" width="312" height="40" fill="#C5B5E8" stroke="#534AB7" stroke-width="3"/>
    <text x="40" y="206" font-family="monospace" font-size="16" font-weight="bold" fill="#534AB7">FOR</text>
    
    <!-- Barra lateral lila -->
    <rect x="0" y="224" width="20" height="48" fill="#C5B5E8" stroke="#534AB7" stroke-width="3"/>
    <rect x="20" y="224" width="292" height="48" fill="#fff" stroke="#534AB7" stroke-width="3"/>
    <rect x="28" y="232" width="276" height="32" fill="#fffbea" stroke="#ddd" stroke-width="1" rx="4"/>
  </g>
  
  <!-- Badge "ORT" -->
  <circle cx="420" cy="92" r="45" fill="#fff" opacity="0.9"/>
  <text x="420" y="103" font-family="Arial" font-size="32" font-weight="bold" fill="#1a3a6e" text-anchor="middle">ORT</text>
</svg>
